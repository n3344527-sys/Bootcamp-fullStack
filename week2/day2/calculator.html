<!DOCTYPE html>
<html>
<head>
    <title>Calculator</title>

    <style>
        body{
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            background:#f2f2f2;
        }

        .calculator{
            background:#f5f5f5;
            padding:40px;
            border-radius:15px;
            box-shadow:0 5px 15px rgba(0,0,0,0.1);
        }

        .display{
            width:320px;
            height:70px;
            margin-bottom:30px;
            border:none;
            border-radius:12px;
            background:white;
            box-shadow:0 3px 10px rgba(0,0,0,0.1);
            font-size:28px;
            text-align:right;
            padding-right:15px;
        }

        .buttons{
            display:grid;
            grid-template-columns:repeat(4,80px);
            gap:15px;
        }

        button{
            height:75px;
            border:none;
            border-radius:12px;
            font-size:30px;
            font-weight:bold;
            cursor:pointer;
            background:white;
            box-shadow:0 3px 10px rgba(0,0,0,0.1);
        }

        .operator{
            background:black;
            color:white;
        }

        .clear{
            background:red;
            color:white;
        }
    </style>

</head>
<body>

    <div class="calculator">

        <input type="text" class="display" readonly>

        <div class="buttons">

            <button>1</button>
            <button>2</button>
            <button>3</button>
            <button class="operator">+</button>

            <button>4</button>
            <button>5</button>
            <button>6</button>
            <button class="operator">-</button>

            <button>7</button>
            <button>8</button>
            <button>9</button>
            <button class="operator">*</button>

            <button class="clear">C</button>
            <button>0</button>
            <button class="operator">=</button>
            <button class="operator">/</button>

        </div>

    </div>

</body>
</html>
<script>
    let bag = '';
    let keys = document.querySelectorAll('button')
    for (let i = 0; i < keys.length; i++) {
        keys[i].addEventListener('click',mycal)

    }
    function mycal(e){
        let targetNumber = e.target.innerText
        const display = document.querySelector('.display');

        if(targetNumber =='C'){
            bag = '';
            display.value = bag;
        } else if(targetNumber =='='){
            let ans = eval(bag)
            display.value = ans;

        } else {
            bag += targetNumber;
            display.value = bag;

        }
    }
</script>
