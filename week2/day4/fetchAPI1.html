<script>
    const api = "  https://jsonplaceholder.typicode.com/todos/";

    fetch(api)
    .then((res)=> res.json())        //converts the JSON text into a JavaScript object
    .then((data)=> console.log(data))
    .catch((err)=> console.log(err))
</script>
